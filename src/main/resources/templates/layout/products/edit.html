<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{index}">
<head>
    <meta charset="UTF-8">
    <title>Product</title>
</head>
<body>
<div layout:fragment="content" class="col-sm-9 content">
    <form class="form-horizontal" th:action="@{/product/update/{id}(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label class="control-label col-sm-2">Product Name:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{name}" placeholder="Enter Username">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-sm-2" >Barcode:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{barcode}"  placeholder="Enter password">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-sm-2">Sell Price:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{sellprice}" placeholder="Enter Address">
            </div>
        </div>

        <div class="form-group">
            <label class="control-label col-sm-2" >Unit Instock:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{unitinstock}" placeholder="Enter Address">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-sm-2" >Photo:</label>
            <div class="col-sm-4">
                <input type="file" class="form-control" name="file">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-sm-2">Category Name:</label>
            <div class="col-sm-4">
                <select class="form-control"th:field="*{category}">
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                    </option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary">Update</button>
                <a th:href="@{/product/}">Back to list</a>
            </div>
        </div>
    </form>
</div>
</body>
</html>
